<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GanadoApp</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a6649">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GanadoApp">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --verde: #1a6649;
  --verde2: #22855e;
  --verde3: #2eaa78;
  --verdeClaro: #e8f5ef;
  --verdePale: #f0faf5;
  --tierra: #8b5e3c;
  --tierraClaro: #fdf3ec;
  --rojo: #c0392b;
  --rojoClaro: #fdecea;
  --naranja: #e67e22;
  --naranjaClaro: #fef5ec;
  --azul: #2980b9;
  --azulClaro: #eaf4fb;
  --gris1: #1a1a1a;
  --gris2: #2d2d2d;
  --gris3: #4a4a4a;
  --gris4: #7a7a7a;
  --gris5: #b0b0b0;
  --gris6: #e0e0e0;
  --gris7: #f5f5f5;
  --blanco: #ffffff;
  --sombra: 0 2px 8px rgba(0,0,0,0.08);
  --sombra2: 0 4px 20px rgba(0,0,0,0.12);
  --radio: 10px;
  --radio2: 6px;
  --font: 'Segoe UI', system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gris7);color:var(--gris1);min-height:100vh}
input,select,textarea,button{font-family:var(--font)}

/* ─── LAYOUT ─── */
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:var(--gris2);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--blanco);border-bottom:1px solid var(--gris6);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--sombra)}
#content{flex:1;overflow-y:auto;padding:20px}

/* ─── SIDEBAR ─── */
.sidebar-logo{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo h1{color:var(--blanco);font-size:18px;font-weight:700;letter-spacing:-.3px}
.sidebar-logo span{color:var(--verde3);font-size:12px}
.nav-section{padding:10px 0}
.nav-label{padding:6px 16px;font-size:10px;font-weight:600;letter-spacing:.8px;color:var(--gris5);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--gris5);font-size:13.5px;transition:all .15s;border-left:3px solid transparent;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.06);color:var(--blanco)}
.nav-item.active{background:rgba(46,170,120,.15);color:var(--verde3);border-left:3px solid var(--verde3)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--rojo);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}

/* ─── TOPBAR ─── */
.page-title{font-size:16px;font-weight:600;color:var(--gris1)}
.topbar-actions{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radio2);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--verde);color:#fff}
.btn-primary:hover{background:var(--verde2)}
.btn-secondary{background:var(--gris7);color:var(--gris3);border:1px solid var(--gris6)}
.btn-secondary:hover{background:var(--gris6)}
.btn-danger{background:var(--rojoClaro);color:var(--rojo)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:7px;border-radius:var(--radio2)}

/* ─── TARJETAS ─── */
.card{background:var(--blanco);border-radius:var(--radio);box-shadow:var(--sombra);overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--gris7);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600;color:var(--gris1)}
.card-body{padding:18px}

/* ─── GRID ─── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* ─── KPIs ─── */
.kpi{background:var(--blanco);border-radius:var(--radio);box-shadow:var(--sombra);padding:16px 18px;display:flex;align-items:center;gap:14px}
.kpi-icon{width:44px;height:44px;border-radius:var(--radio2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-num{font-size:26px;font-weight:700;line-height:1}
.kpi-label{font-size:12px;color:var(--gris4);margin-top:2px}

/* ─── ALERTAS ─── */
.alerta-item{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border-radius:var(--radio2);margin-bottom:8px;border-left:3px solid}
.alerta-rojo{background:var(--rojoClaro);border-color:var(--rojo)}
.alerta-naranja{background:var(--naranjaClaro);border-color:var(--naranja)}
.alerta-verde{background:var(--verdeClaro);border-color:var(--verde)}
.alerta-azul{background:var(--azulClaro);border-color:var(--azul)}
.alerta-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.alerta-titulo{font-size:13px;font-weight:600}
.alerta-det{font-size:12px;color:var(--gris3);margin-top:2px}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-verde{background:var(--verdeClaro);color:var(--verde)}
.badge-rojo{background:var(--rojoClaro);color:var(--rojo)}
.badge-naranja{background:var(--naranjaClaro);color:var(--naranja)}
.badge-azul{background:var(--azulClaro);color:var(--azul)}
.badge-gris{background:var(--gris7);color:var(--gris4);border:1px solid var(--gris6)}

/* ─── FORMS ─── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:12px;font-weight:600;color:var(--gris3)}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 11px;border:1.5px solid var(--gris6);border-radius:var(--radio2);font-size:13.5px;transition:border-color .15s;background:var(--blanco);color:var(--gris1)}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--verde)}
.form-hint{font-size:11px;color:var(--gris5)}

/* ─── TABLA ─── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--gris7)}
th{padding:10px 14px;font-size:11px;font-weight:600;color:var(--gris4);text-align:left;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--gris7);vertical-align:middle}
tr:hover td{background:#fbfbfb}
.td-car{font-family:monospace;font-weight:600;color:var(--gris1);font-size:13px}

/* ─── MODAL ─── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--blanco);border-radius:var(--radio);box-shadow:var(--sombra2);width:90%;max-width:600px;max-height:92vh;display:flex;flex-direction:column}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--gris6);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:600}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--gris6);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--gris4);line-height:1;padding:2px 6px}

/* ─── TABS ─── */
.tabs-nav{display:flex;gap:2px;border-bottom:2px solid var(--gris6);margin-bottom:16px}
.tab-btn{background:none;border:none;padding:8px 14px;font-size:13px;color:var(--gris4);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-weight:500}
.tab-btn.active{color:var(--verde);border-bottom-color:var(--verde);font-weight:600}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ─── SEARCH BAR ─── */
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1;min-width:180px;padding:8px 12px;border:1.5px solid var(--gris6);border-radius:var(--radio2);font-size:13px}
.search-input:focus{outline:none;border-color:var(--verde)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--gris6);background:var(--blanco);cursor:pointer;transition:all .15s;color:var(--gris3)}
.chip.active{background:var(--verde);color:#fff;border-color:var(--verde)}

/* ─── MODO MANGA ─── */
#modoCarta{display:none;position:fixed;inset:0;background:#111;z-index:2000;flex-direction:column}
#modoCarta.open{display:flex}
.mc-header{background:#1a1a1a;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333}
.mc-title{color:#fff;font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px}
.mc-body{flex:1;overflow-y:auto;padding:20px}
.mc-car-display{text-align:center;padding:20px 0 10px;color:#666;font-size:13px}
.mc-car-num{font-size:48px;font-weight:800;color:var(--verde3);letter-spacing:2px;font-family:monospace;text-align:center;padding:10px;background:#1a1a1a;border-radius:12px;border:2px solid #333;margin:8px 0}
.mc-input-car{width:100%;background:#1a1a1a;border:2px solid var(--verde);color:var(--verde3);font-size:22px;font-weight:700;padding:12px 16px;border-radius:10px;text-align:center;font-family:monospace;letter-spacing:2px}
.mc-input-car:focus{outline:none;border-color:var(--verde3);background:#1f1f1f}
.mc-accion-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.mc-accion-btn{background:#1a1a1a;border:2px solid #333;border-radius:12px;padding:14px;cursor:pointer;color:#ccc;font-size:13px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s;min-height:80px;justify-content:center}
.mc-accion-btn:hover,.mc-accion-btn.sel{background:#1a6649;border-color:var(--verde3);color:#fff}
.mc-accion-btn span{font-size:24px}
.mc-form-mini{background:#1a1a1a;border-radius:12px;padding:16px;margin-top:14px;border:1px solid #2a2a2a}
.mc-label{font-size:11px;font-weight:600;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.mc-input{width:100%;background:#111;border:1.5px solid #333;color:#eee;padding:10px 14px;border-radius:8px;font-size:16px}
.mc-input:focus{outline:none;border-color:var(--verde3)}
.mc-btn-guardar{width:100%;background:var(--verde);color:#fff;border:none;padding:16px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.mc-btn-guardar:hover{background:var(--verde2)}
.mc-btn-guardar:active{transform:scale(.98)}
.mc-status{text-align:center;padding:8px;font-size:12px;color:#666;margin-top:8px}
.mc-animal-info{background:#1a1a1a;border-radius:8px;padding:10px 14px;margin-top:10px;border-left:3px solid var(--verde3)}
.mc-animal-info p{font-size:12px;color:#aaa;line-height:1.7}
.mc-animal-info strong{color:#eee}

/* ─── VOZ ─── */
.voz-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .2s;flex-shrink:0}
.voz-btn.idle{background:#222;color:#888}
.voz-btn.escuchando{background:var(--rojo);color:#fff;animation:pulse-mic 1s infinite}
.voz-btn.procesando{background:var(--naranja);color:#fff}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.4)}50%{box-shadow:0 0 0 12px rgba(192,57,43,0)}}
.voz-status-bar{background:#1a1a1a;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:12px;color:#666;min-height:38px;display:flex;align-items:center;gap:8px;border:1px solid #2a2a2a}
.voz-texto{color:#aaa;flex:1;line-height:1.4}
.voz-olas{display:none;gap:2px;align-items:center;flex-shrink:0}
.voz-olas.vis{display:flex}
.ola{width:3px;border-radius:2px;background:var(--rojo);animation:ola .6s ease-in-out infinite}
.ola:nth-child(1){height:8px;animation-delay:0s}
.ola:nth-child(2){height:16px;animation-delay:.1s}
.ola:nth-child(3){height:22px;animation-delay:.2s}
.ola:nth-child(4){height:16px;animation-delay:.3s}
.ola:nth-child(5){height:8px;animation-delay:.4s}
@keyframes ola{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}

/* ─── GABINETE ─── */
.med-card{background:var(--blanco);border-radius:var(--radio);box-shadow:var(--sombra);padding:14px 16px;display:flex;align-items:center;gap:14px;border-left:4px solid var(--verde)}
.med-card.bajo{border-left-color:var(--naranja)}
.med-card.vence{border-left-color:var(--rojo)}
.med-info{flex:1}
.med-nombre{font-size:14px;font-weight:600}
.med-det{font-size:12px;color:var(--gris4);margin-top:2px}
.med-stock{font-size:22px;font-weight:700;color:var(--verde);white-space:nowrap}
.med-stock.bajo{color:var(--naranja)}
.med-stock.agotado{color:var(--rojo)}

/* ─── CARENCIA ─── */
.carencia-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.carencia-activa{background:var(--rojoClaro);color:var(--rojo);border:1px solid #f5c6c3}
.carencia-ok{background:var(--verdeClaro);color:var(--verde);border:1px solid #b8e5cd}

/* ─── HISTORIAL ─── */
.evento-item{padding:10px 0;border-bottom:1px solid var(--gris7);display:flex;gap:12px;align-items:flex-start}
.evento-dot{width:8px;height:8px;border-radius:50%;background:var(--verde);margin-top:5px;flex-shrink:0}
.evento-body{flex:1}
.evento-titulo{font-size:13px;font-weight:500}
.evento-det{font-size:12px;color:var(--gris4);margin-top:2px}

/* ─── TOAST ─── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--gris1);color:#fff;padding:12px 18px;border-radius:var(--radio);font-size:13px;z-index:9999;opacity:0;transition:opacity .25s;max-width:320px;box-shadow:var(--sombra2)}
#toast.show{opacity:1}
#toast.ok{border-left:4px solid var(--verde3)}
#toast.err{border-left:4px solid var(--rojo)}

/* ─── FEED ACTIVIDAD ─── */
.feed-item{padding:9px 0;border-bottom:1px solid var(--gris7);display:flex;gap:10px;align-items:center;font-size:12.5px;color:var(--gris3)}
.feed-icon{font-size:16px;flex-shrink:0}

/* ─── EMPTY STATE ─── */
.empty-state{text-align:center;padding:48px 20px;color:var(--gris4)}
.empty-state p{margin-top:10px;font-size:14px}
.empty-icon{font-size:40px}

/* ─── UTILS ─── */
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.mb-14{margin-bottom:14px}
.text-xs{font-size:11px}.text-sm{font-size:12px}.text-muted{color:var(--gris4)}.fw-600{font-weight:600}
.w-100{width:100%}.d-none{display:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── RESPONSIVE MOBILE ─── */
/* Botón hamburguesa */
#menu-toggle{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--gris3)}
#menu-toggle svg{width:24px;height:24px}
/* Overlay sidebar mobile */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}

/* Botón voz en formularios normales */
.voz-campo-btn{background:none;border:1.5px solid var(--gris6);border-radius:var(--radio2);padding:6px 10px;cursor:pointer;font-size:16px;transition:all .15s;flex-shrink:0;height:38px;display:flex;align-items:center}
.voz-campo-btn:hover{border-color:var(--verde);background:var(--verdeClaro)}
.voz-campo-btn.escuchando{border-color:var(--rojo);background:var(--rojoClaro);animation:pulse-mic 1s infinite}
.input-voz-wrap{display:flex;gap:6px;align-items:center}
.input-voz-wrap .form-input,.input-voz-wrap .form-select,.input-voz-wrap .form-textarea{flex:1}

@media(max-width:768px){
  /* Layout principal */
  #app{flex-direction:column}
  #sidebar{
    position:fixed;left:-240px;top:0;bottom:0;z-index:100;
    width:240px;transition:left .25s;overflow-y:auto
  }
  #sidebar.open{left:0}
  #sidebar-overlay.open{display:block}
  #main{width:100%;min-height:100vh;padding-bottom:70px}
  
  /* Topbar mobile */
  #topbar{padding:0 12px;height:52px}
  .page-title{font-size:14px;font-weight:600}
  #menu-toggle{display:flex}
  
  /* Nav inferior mobile */
  #bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--blanco);border-top:1px solid var(--gris6);
    z-index:80;height:62px;box-shadow:0 -2px 10px rgba(0,0,0,.08)
  }
  .bnav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;border:none;background:none;
    cursor:pointer;color:var(--gris4);font-size:10px;font-weight:500;
    padding:6px 2px;transition:color .15s;position:relative
  }
  .bnav-item svg{width:22px;height:22px}
  .bnav-item.active{color:var(--verde)}
  .bnav-item.active svg{stroke:var(--verde)}
  .bnav-badge{position:absolute;top:4px;right:calc(50% - 18px);background:var(--rojo);color:#fff;border-radius:10px;padding:0 4px;font-size:9px;font-weight:700;min-width:14px;text-align:center}

  /* Contenido */
  #content{padding:12px}
  
  /* Grids responsive */
  .grid-4{grid-template-columns:1fr 1fr;gap:10px}
  .grid-3{grid-template-columns:1fr 1fr;gap:10px}
  .grid-2{grid-template-columns:1fr;gap:10px}
  .form-grid{grid-template-columns:1fr;gap:10px}
  .form-full{grid-column:1}
  
  /* KPIs más compactos */
  .kpi{padding:12px 14px}
  .kpi-num{font-size:22px}
  
  /* Cards */
  .card-body{padding:14px}
  
  /* Tabla scroll horizontal */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:500px}
  
  /* Modal full screen en mobile */
  .modal{width:100%;max-width:100%;height:100%;max-height:100%;border-radius:0;margin:0}
  .modal-bg{align-items:flex-end}
  .modal-bg .modal{border-radius:16px 16px 0 0;max-height:92vh}
  
  /* Modo Manga en mobile */
  .mc-car-num{font-size:32px}
  .mc-input-car{font-size:18px;padding:10px 12px}
  .mc-accion-grid{grid-template-columns:1fr 1fr 1fr;gap:8px}
  .mc-accion-btn{padding:10px 6px;min-height:70px;font-size:12px}
  .mc-accion-btn span{font-size:20px}
  .mc-btn-guardar{padding:14px;font-size:15px}
  
  /* Gabinete */
  .med-card{flex-wrap:wrap;gap:10px}
  
  /* Ocultar sidebar label en mobile */
  .nav-label{display:none}

  /* Toast en mobile */
  #toast{bottom:80px;right:12px;left:12px;max-width:none}
}

@media(min-width:769px){
  #bottom-nav{display:none}
}
</style>
</head>
<body>

<div id="app">
<!-- ─── OVERLAY MOBILE ─── -->

<script>
// ════════════════════════════════════════════════
// DATOS
// ════════════════════════════════════════════════
const KEYS = { an:'ganadoapp_v2', rod:'ganadoapp_v2_rod', act:'ganadoapp_v2_act', med:'ganadoapp_v2_meds' };
const CATS = ['vaca','vaquillona','toro','torito','ternero','ternera','novillo','novillito'];
const RAZAS = ['Aberdeen Angus','Hereford','Shorthorn','Brahman','Brangus','Braford','Limousin','Charolais','Simmental','Otro'];
const TIPO_SAN = ['vacuna','antibiótico','antiparasitario','vitamínico','antiinflamatorio','otro'];
const TIPO_EV = ['parto','destete','servicio','castración','movimiento','diagnóstico','otro'];
const hoy = () => new Date().toISOString().split('T')[0];

function load(k){ try{ return JSON.parse(localStorage.getItem(k)||'null') }catch(e){ return null } }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)) }

let animales = load(KEYS.an) || [];
let rodeos   = load(KEYS.rod) || [];
let actividad= load(KEYS.act) || [];
let meds     = load(KEYS.med) || [];

function saveAll(){ save(KEYS.an,animales); save(KEYS.rod,rodeos); save(KEYS.act,actividad); save(KEYS.med,meds) }

// ════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════
function uid(){ return Date.now()+'_'+Math.random().toString(36).slice(2,7) }
function fmtFecha(f){ if(!f) return '—'; const p=f.split('-'); return p[2]+'/'+p[1]+'/'+p[0] }
function diasDesde(f){ if(!f) return null; return Math.round((Date.now()-new Date(f+'T00:00:00'))/(86400000)) }
function diasHasta(f){ if(!f) return null; return Math.round((new Date(f+'T00:00:00')-Date.now())/(86400000)) }
function gdp(pesajes){ if(!pesajes||pesajes.length<2) return null; const s=pesajes[0],e=pesajes[pesajes.length-1]; const d=diasDesde(s.fecha); if(!d||d<=0) return null; return ((e.kg-s.kg)/d).toFixed(2) }
function catColor(c){ const m={vaca:'#1a6649',vaquillona:'#2980b9',toro:'#8b5e3c',torito:'#c0392b',ternero:'#27ae60',ternera:'#16a085',novillo:'#7f8c8d',novillito:'#95a5a6'}; return m[c]||'#7a7a7a' }

function addActividad(ico,titulo,det){ actividad.unshift({ico,titulo,det,fecha:hoy()}); if(actividad.length>30) actividad.pop(); save(KEYS.act,actividad) }

function toast(msg,tipo='ok'){ const t=document.getElementById('toast'); t.textContent=msg; t.className='show '+(tipo==='ok'?'ok':'err'); clearTimeout(t._t); t._t=setTimeout(()=>t.className='',2800) }

function carenciasActivas(animal){ 
  if(!animal.sanidad) return [];
  const hoyStr=hoy();
  return animal.sanidad.filter(s=>s.carenciaFinCarne&&s.carenciaFinCarne>=hoyStr);
}
function enCarencia(animal){ return carenciasActivas(animal).length>0 }

// ════════════════════════════════════════════════
// ALERTAS
// ════════════════════════════════════════════════
function calcAlertas(){
  const al = [];
  const hoyStr = hoy();
  const en7  = new Date(); en7.setDate(en7.getDate()+7);
  const en30 = new Date(); en30.setDate(en30.getDate()+30);
  
  animales.forEach(a=>{
    // Carencia activa
    carenciasActivas(a).forEach(s=>{
      const dias=diasHasta(s.carenciaFinCarne);
      al.push({tipo:'rojo',ico:'🚫',titulo:`${a.car} — En carencia (${s.producto||'trat.'})`,det:`Apto faena en ${dias} día${dias!==1?'s':''}  (${fmtFecha(s.carenciaFinCarne)})`,car:a.car});
    });
    // Partos próximos
    if(a.eventos) a.eventos.filter(e=>e.tipo==='diagnóstico'&&e.fechaParto).forEach(e=>{
      const fp=new Date(e.fechaParto+'T00:00:00');
      if(fp<=en30&&fp>=new Date()){
        const dias=diasHasta(e.fechaParto);
        const urgencia=fp<=en7?'rojo':'naranja';
        al.push({tipo:urgencia,ico:'🐄',titulo:`Parto próximo: ${a.car}`,det:`Estimado ${fmtFecha(e.fechaParto)} — en ${dias} días`});
      }
    });
  });
  
  // Medicamentos bajo stock o por vencer
  meds.forEach(m=>{
    if(m.stock<=m.alertaStock) al.push({tipo:'naranja',ico:'💊',titulo:`Stock bajo: ${m.nombre}`,det:`Quedan ${m.stock} ${m.unidad}`});
    if(m.vencimiento){ const dv=diasHasta(m.vencimiento); if(dv>=0&&dv<=30) al.push({tipo:dv<=7?'rojo':'naranja',ico:'⚠️',titulo:`Vence pronto: ${m.nombre}`,det:`Vence en ${dv} días (${fmtFecha(m.vencimiento)})`}) }
  });
  
  // Actualizar badge nav
  const badge=document.getElementById('badge-alertas');
  const bnavBadge=document.getElementById('bnav-badge');
  if(al.length>0){
    if(badge){ badge.textContent=al.length; badge.style.display=''; }
    if(bnavBadge){ bnavBadge.textContent=al.length; bnavBadge.style.display=''; }
  } else {
    if(badge) badge.style.display='none';
    if(bnavBadge) bnavBadge.style.display='none';
  }
  return al;
}

// ════════════════════════════════════════════════
// SIDEBAR MOBILE
// ════════════════════════════════════════════════
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('open');
}
function cerrarSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ════════════════════════════════════════════════
// NAVEGACIÓN
// ════════════════════════════════════════════════
let paginaActual='';
function navTo(p){
  paginaActual=p;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const btn = [...document.querySelectorAll('.nav-item')].find(b=>b.getAttribute('onclick')?.includes("'"+p+"'"));
  if(btn) btn.classList.add('active');
  // Bottom nav
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  const bnav=document.getElementById('bnav-'+p);
  if(bnav) bnav.classList.add('active');
  const titulos={dashboard:'Dashboard',manga:'Modo Manga',animales:'Animales',registrar:'Registrar animal',rodeos:'Rodeos',gabinete:'Gabinete',resumen:'Resumen'};
  document.getElementById('page-title').textContent=titulos[p]||p;
  cerrarSidebar();
  if(p==='manga'){ abrirManga(); return; }
  render[p]&&render[p]();
}

// ════════════════════════════════════════════════
// RENDERS
// ════════════════════════════════════════════════
const render = {};

// ─── DASHBOARD ───
render.dashboard = function(){
  const al = calcAlertas();
  const totalAn = animales.length;
  const conPeso = animales.filter(a=>a.pesajes&&a.pesajes.length>0).length;
  const preniadas = animales.filter(a=>a.preg==='preñada').length;
  const enCar = animales.filter(a=>enCarencia(a)).length;
  
  // KPIs por categoría
  const porCat = {};
  CATS.forEach(c=>porCat[c]=0);
  animales.forEach(a=>{ if(porCat[a.cat]!==undefined) porCat[a.cat]++ });
  const maxCat = Math.max(...Object.values(porCat),1);
  const catBars = CATS.map(c=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="width:80px;font-size:12px;color:var(--gris3);text-transform:capitalize">${c}</div>
      <div style="flex:1;background:var(--gris7);border-radius:4px;height:16px;overflow:hidden">
        <div style="width:${(porCat[c]/maxCat*100).toFixed(0)}%;background:${catColor(c)};height:100%;border-radius:4px;transition:width .5s"></div>
      </div>
      <div style="width:30px;text-align:right;font-size:12px;font-weight:600">${porCat[c]}</div>
    </div>`).join('');
  
  const alertasHTML = al.length===0 
    ? `<div class="empty-state" style="padding:20px"><div class="empty-icon">✅</div><p>Sin alertas activas</p></div>`
    : al.map(a=>`<div class="alerta-item alerta-${a.tipo}"><span class="alerta-icon">${a.ico}</span><div><div class="alerta-titulo">${a.titulo}</div><div class="alerta-det">${a.det}</div></div></div>`).join('');
  
  const feedHTML = actividad.length===0
    ? `<p style="color:var(--gris4);font-size:13px;text-align:center;padding:20px">Sin actividad reciente</p>`
    : actividad.slice(0,10).map(a=>`<div class="feed-item"><span class="feed-icon">${a.ico}</span><div><strong>${a.titulo}</strong> — ${a.det} <span style="color:var(--gris5)">${fmtFecha(a.fecha)}</span></div></div>`).join('');
  
  const c = document.getElementById('content');
  c.innerHTML=`
  <div class="grid-4" style="margin-bottom:16px">
    <div class="kpi"><div class="kpi-icon" style="background:#e8f5ef"><span style="font-size:22px">🐄</span></div><div><div class="kpi-num">${totalAn}</div><div class="kpi-label">Animales</div></div></div>
    <div class="kpi"><div class="kpi-icon" style="background:#fdf3ec"><span style="font-size:22px">⚖️</span></div><div><div class="kpi-num">${conPeso}</div><div class="kpi-label">Con pesaje</div></div></div>
    <div class="kpi"><div class="kpi-icon" style="background:#eaf4fb"><span style="font-size:22px">🤰</span></div><div><div class="kpi-num">${preniadas}</div><div class="kpi-label">Preñadas</div></div></div>
    <div class="kpi"><div class="kpi-icon" style="background:${enCar>0?'#fdecea':'#e8f5ef'}"><span style="font-size:22px">🚫</span></div><div><div class="kpi-num" style="color:${enCar>0?'var(--rojo)':'var(--verde)'}">${enCar}</div><div class="kpi-label">En carencia</div></div></div>
  </div>
  <div class="grid-2">
    <div>
      <div class="card mb-14">
        <div class="card-header"><span class="card-title">⚠️ Alertas ${al.length>0?`<span class="badge badge-rojo">${al.length}</span>`:''}</span></div>
        <div class="card-body" style="padding:12px">${alertasHTML}</div>
      </div>
      <div class="card">

// ─── ANIMALES ───
let filtrosCat=new Set(); let busq='';
render.animales = function(){

  const chipsCat = CATS.map(c=>`<span class="chip ${filtrosCat.has(c)?'active':''}" onclick="toggleFiltro('${c}')">${c}</span>`).join('');
  
  let lista = animales.filter(a=>{
    if(filtrosCat.size>0&&!filtrosCat.has(a.cat)) return false;
    if(busq&&!(a.car.toLowerCase().includes(busq)||(a.ide||'').includes(busq)||a.raza?.toLowerCase().includes(busq)||(a.estab||'').toLowerCase().includes(busq))) return false;
    return true;
  });
  
  const filas = lista.length===0
    ? `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">🐄</div><p>No hay animales con esos filtros</p></div></td></tr>`
    : lista.map(a=>{
      const ult = a.pesajes&&a.pesajes.length>0?a.pesajes[a.pesajes.length-1]:null;
      const enCar = enCarencia(a);
      const carBadge = enCar?`<span class="carencia-badge carencia-activa">🚫 En carencia</span>`:`<span class="carencia-badge carencia-ok">✓ Apto</span>`;
      return `<tr onclick="verAnimal('${a.id}')" style="cursor:pointer">
        <td class="td-car">${a.car}${a.ide?`<br><span style="font-size:10px;color:var(--gris5);font-weight:400;font-family:monospace">${a.ide}</span>`:''}</td>
        <td><span class="badge" style="background:${catColor(a.cat)}20;color:${catColor(a.cat)}">${a.cat}</span></td>
        <td>${a.raza||'—'}</td>
        <td>${a.estab||'—'}</td>
        <td>${ult?ult.kg+' kg':'—'}</td>
        <td>${a.preg&&a.preg!=='-'?`<span class="badge ${a.preg==='preñada'?'badge-azul':'badge-gris'}">${a.preg}</span>`:'—'}</td>
        <td>${carBadge}</td>
        <td>${fmtFecha(a.fecha)}</td>
      </tr>`;
    }).join('');
  
  document.getElementById('content').innerHTML=`
  <div class="search-bar">
    <input class="search-input" placeholder="Buscar por IDV, IDE electrónico, raza, establecimiento..." value="${busq}" oninput="busq=this.value;render.animales()">
    <div class="chips">${chipsCat}</div>
  </div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>Caravana</th><th>Categoría</th><th>Raza</th><th>Establecimiento</th><th>Último peso</th><th>Preñez</th><th>Carencia</th><th>Registro</th></tr></thead>
        <tbody>${filas}</tbody>
      </table>
    </div>
  </div>`;
};
function toggleFiltro(c){ filtrosCat.has(c)?filtrosCat.delete(c):filtrosCat.add(c); render.animales() }

// ─── REGISTRAR ───

    <button class="btn btn-primary" onclick="guardarAnimalPage()">Guardar animal</button>

  return `<div class="form-grid">

    <div class="form-group"><label class="form-label">Color / Pelo</label><div class="input-voz-wrap"><input id="f-color" class="form-input" value="${a?.color||''}" placeholder="Colorado, Negro, etc.">${btnVoz('f-color','color')}</div></div>
    <div class="form-group"><label class="form-label">Edad (meses)</label><div class="input-voz-wrap"><input id="f-edad" type="number" class="form-input" value="${a?.edad||''}">${btnVoz('f-edad','edad en meses')}</div></div>
    <div class="form-group"><label class="form-label">Dientes</label><div class="input-voz-wrap"><input id="f-dientes" class="form-input" value="${dt}" placeholder="2D — ½ , BL, etc.">${btnVoz('f-dientes','dientes')}</div></div>

    <div class="form-group"><label class="form-label">Fecha peso</label><input id="f-pesofecha" type="date" class="form-input" value="${a?.pesajes?.[0]?.fecha||hoy()}"></div>
    <div class="form-group form-full"><label class="form-label">Observaciones</label><div class="input-voz-wrap"><textarea id="f-obs" class="form-input form-textarea" rows="2">${a?.obs||''}</textarea>${btnVoz('f-obs','observaciones')}</div></div>
  </div>`;
}
function guardarAnimalPage(){
  const car=document.getElementById('f-car').value.trim().toUpperCase();
  if(!car){ toast('La caravana IDV es obligatoria','err'); return; }
  const existente=animales.find(a=>a.car===car&&a.id!==editId);
  if(existente){ toast('Ya existe un animal con esa caravana','err'); return; }
  const ideVal=document.getElementById('f-ide').value.trim();
  if(ideVal&&ideVal.length>0&&ideVal.length!==15){ toast('El IDE debe tener exactamente 15 dígitos','err'); return; }
  const ideExistente=ideVal?animales.find(a=>a.ide===ideVal&&a.id!==editId):null;
  if(ideExistente){ toast('Ya existe un animal con ese IDE electrónico','err'); return; }
  
  const kg=parseFloat(document.getElementById('f-peso').value)||null;
  const pesajes=editId?animales.find(a=>a.id===editId)?.pesajes||[]:[];
  if(kg&&!editId) pesajes.push({kg,fecha:document.getElementById('f-pesofecha').value,ts:Date.now()});
  
  const datos={
    car,ide:ideVal||null,fecha:document.getElementById('f-fecha').value,estab:document.getElementById('f-estab').value.trim(),
    cat:document.getElementById('f-cat').value,raza:document.getElementById('f-raza').value,color:document.getElementById('f-color').value.trim(),
    edad:parseInt(document.getElementById('f-edad').value)||null,dientes:document.getElementById('f-dientes').value.trim(),
    preg:document.getElementById('f-preg').value,obs:document.getElementById('f-obs').value.trim(),pesajes,
  };
  
  if(editId){ const i=animales.findIndex(a=>a.id===editId); Object.assign(animales[i],datos); }
  else{ animales.push({id:uid(),sanidad:[],eventos:[],foto:null,reg:hoy(),ts:Date.now(),...datos}); }
  saveAll();
  addActividad('🐄',car,`${datos.cat} - ${datos.raza||''} ${kg?'· '+kg+'kg':''}`);
  toast(editId?'Animal actualizado':'Animal registrado');
  editId=null;
  navTo('animales');
}

function swTab(btn,id){ 
  btn.closest('.modal-body, #content').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.modal-body, #content').querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function formSanidadHTML(animalId){
  const medsOpts=meds.map(m=>`<option value="${m.id}" data-car="${m.carenciaCarne||0}" data-ld="${m.carenciaLeche||0}">${m.nombre} (${m.stock} ${m.unidad})</option>`).join('');
  const tipoOpts=TIPO_SAN.map(t=>`<option>${t}</option>`).join('');
  return`<div class="form-grid" id="form-san-${animalId}">
    <div class="form-group"><label class="form-label">Medicamento del gabinete</label>
      <select id="san-med-${animalId}" class="form-select" onchange="autoFillCarencia('${animalId}')"><option value="">— Seleccionar —</option>${medsOpts}</select>
    </div>
    <div class="form-group"><label class="form-label">Producto (libre)</label><input id="san-prod-${animalId}" class="form-input" placeholder="Nombre del producto"></div>
    <div class="form-group"><label class="form-label">Tipo</label><select id="san-tipo-${animalId}" class="form-select">${tipoOpts}</select></div>
    <div class="form-group"><label class="form-label">Dosis</label><input id="san-dosis-${animalId}" class="form-input" placeholder="10ml, 5cc, etc."></div>
    <div class="form-group"><label class="form-label">Fecha</label><input id="san-fecha-${animalId}" type="date" class="form-input" value="${hoy()}"></div>
    <div class="form-group"><label class="form-label">Días carencia (carne)</label><input id="san-car-${animalId}" type="number" class="form-input" placeholder="28" min="0"></div>
    <div class="form-group"><label class="form-label">Días carencia (leche)</label><input id="san-carl-${animalId}" type="number" class="form-input" placeholder="0" min="0"></div>
    <div class="form-group"><label class="form-label">Nota</label><input id="san-nota-${animalId}" class="form-input" placeholder="Observación"></div>
    <div class="form-group form-full"><button class="btn btn-primary btn-sm" onclick="guardarSanidad('${animalId}')">+ Registrar tratamiento</button></div>
  </div>`;
}
function autoFillCarencia(id){
  const sel=document.getElementById('san-med-'+id);
  const opt=sel.options[sel.selectedIndex];
  if(opt&&opt.value){
    document.getElementById('san-car-'+id).value=opt.dataset.car||'';
    document.getElementById('san-carl-'+id).value=opt.dataset.ld||'';
    const med=meds.find(m=>m.id===opt.value);
    if(med) document.getElementById('san-prod-'+id).value=med.nombre;
  }
}
function calcCarenciaFin(fecha,dias){
  if(!dias||dias<=0) return null;
  const d=new Date(fecha+'T00:00:00'); d.setDate(d.getDate()+parseInt(dias));
  return d.toISOString().split('T')[0];
}
function guardarSanidad(animalId){
  const a=animales.find(x=>x.id===animalId); if(!a) return;
  const prod=document.getElementById('san-prod-'+animalId).value.trim()||document.getElementById('san-med-'+animalId).options[document.getElementById('san-med-'+animalId).selectedIndex]?.text;
  const fecha=document.getElementById('san-fecha-'+animalId).value;
  const carDias=parseInt(document.getElementById('san-car-'+animalId).value)||0;
  const carLDias=parseInt(document.getElementById('san-carl-'+animalId).value)||0;
  const medId=document.getElementById('san-med-'+animalId).value;
  
  const san={id:uid(),producto:prod,tipo:document.getElementById('san-tipo-'+animalId).value,dosis:document.getElementById('san-dosis-'+animalId).value.trim(),fecha,nota:document.getElementById('san-nota-'+animalId).value.trim(),medId,carenciaDiasCarne:carDias,carenciaDiasLeche:carLDias,carenciaFinCarne:calcCarenciaFin(fecha,carDias),carenciaFinLeche:calcCarenciaFin(fecha,carLDias)};
  
  if(!a.sanidad) a.sanidad=[];
  a.sanidad.push(san);
  
  // Descontar stock gabinete
  if(medId){ const m=meds.find(x=>x.id===medId); if(m&&m.stock>0){ const dosNum=parseFloat(san.dosis)||1; m.stock=Math.max(0,m.stock-dosNum); } }
  
  saveAll();
  addActividad('💉',a.car,`${prod} — ${san.tipo}`);
  toast('Tratamiento registrado');
  verAnimal(animalId); // refresh modal
}

function formEventoHTML(animalId){
  const tipos=TIPO_EV.map(t=>`<option>${t}</option>`).join('');
  return`<div class="form-grid">
    <div class="form-group"><label class="form-label">Tipo de evento</label><select id="ev-tipo-${animalId}" class="form-select">${tipos}</select></div>
    <div class="form-group"><label class="form-label">Fecha</label><input id="ev-fecha-${animalId}" type="date" class="form-input" value="${hoy()}"></div>
    <div class="form-group"><label class="form-label">Fecha parto estimada (si es diagnóstico)</label><input id="ev-fparto-${animalId}" type="date" class="form-input"></div>
    <div class="form-group"><label class="form-label">Descripción</label><input id="ev-desc-${animalId}" class="form-input" placeholder="Detalle del evento"></div>
    <div class="form-group form-full"><button class="btn btn-primary btn-sm" onclick="guardarEvento('${animalId}')">+ Registrar evento</button></div>
  </div>`;
}
function guardarEvento(animalId){
  const a=animales.find(x=>x.id===animalId); if(!a) return;
  const tipo=document.getElementById('ev-tipo-'+animalId).value;
  const ev={id:uid(),tipo,fecha:document.getElementById('ev-fecha-'+animalId).value,desc:document.getElementById('ev-desc-'+animalId).value.trim(),fechaParto:document.getElementById('ev-fparto-'+animalId).value||null};
  if(!a.eventos) a.eventos=[];
  a.eventos.push(ev);
  if(tipo==='parto') a.preg='vacía';
  if(tipo==='servicio') a.preg='sin dato';
  saveAll();
  addActividad('📋',a.car,tipo);
  toast('Evento registrado');
  verAnimal(animalId);
}

function addPeso(animalId){
  const a=animales.find(x=>x.id===animalId); if(!a) return;
  const kg=parseFloat(document.getElementById('np-kg').value);
  if(!kg){ toast('Ingresá el peso','err'); return; }
  const fecha=document.getElementById('np-fecha').value;
  if(!a.pesajes) a.pesajes=[];

  saveAll();
  addActividad('⚖️',a.car,kg+' kg');
  toast('Pesaje registrado');
  verAnimal(animalId);
}

function eliminarAnimal(id){
  animales=animales.filter(a=>a.id!==id);

}

  </div>
  <div id="rt-sanidad" class="tab-panel">
    <p class="text-sm text-muted mb-8">Aplica el tratamiento a todos los animales del rodeo</p>

function swTabModal(btn,id){
  const cont=btn.closest('.modal-body');
  cont.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  cont.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function addAlRodeo(rId){
  const sel=document.getElementById('rod-add-sel'); const aId=sel.value; if(!aId) return;
  const r=rodeos.find(x=>x.id===rId); if(!r.animales) r.animales=[];
  if(!r.animales.includes(aId)){ r.animales.push(aId); saveAll(); toast('Animal agregado'); verRodeo(rId); }
  else toast('Ya está en el rodeo','err');
}
function quitarDeRodeo(rId,aId){ const r=rodeos.find(x=>x.id===rId); r.animales=r.animales.filter(x=>x!==aId); saveAll(); verRodeo(rId); }

let rodScanLog=[];
function rodScanInput(rId){
  const inp=document.getElementById('rod-scan'); if(!inp) return;
  const v=inp.value.trim().toUpperCase();
  if(v.length<4) return;
  setTimeout(()=>{
    if(inp.value.trim().toUpperCase()!==v) return;
    const r=rodeos.find(x=>x.id===rId);
    let a=animales.find(x=>x.car===v);
    if(!a){ a={id:uid(),car:v,cat:'ternero',fecha:hoy(),sanidad:[],eventos:[],pesajes:[],reg:hoy(),ts:Date.now()}; animales.push(a); }
    if(!r.animales.includes(a.id)){ r.animales.push(a.id); }
    saveAll(); inp.value=''; inp.focus();
    rodScanLog.unshift(v);
    const log=document.getElementById('rod-scan-log');
    if(log) log.innerHTML=rodScanLog.slice(0,5).map(c=>`<div class="feed-item"><span>🏷</span>${c} agregado</div>`).join('');
  },350);
}

function autoBatchCarencia(){
  const sel=document.getElementById('rsb-med'); const opt=sel.options[sel.selectedIndex];
  if(opt?.value){ const m=meds.find(x=>x.id===opt.value); if(m){ document.getElementById('rsb-car').value=m.carenciaCarne||0; document.getElementById('rsb-prod').value=m.nombre; } }
}
function sanidadBatch(rId){
  const r=rodeos.find(x=>x.id===rId); if(!r) return;
  const prod=document.getElementById('rsb-prod').value.trim();
  const fecha=document.getElementById('rsb-fecha').value;
  const carDias=parseInt(document.getElementById('rsb-car').value)||0;
  const medId=document.getElementById('rsb-med').value;
  const san={id:uid(),producto:prod,tipo:document.getElementById('rsb-tipo').value,dosis:document.getElementById('rsb-dosis').value.trim(),fecha,nota:document.getElementById('rsb-nota').value.trim(),medId,carenciaDiasCarne:carDias,carenciaFinCarne:calcCarenciaFin(fecha,carDias)};
  
  r.animales?.forEach(aid=>{
    const a=animales.find(x=>x.id===aid); if(!a) return;
    if(!a.sanidad) a.sanidad=[];
    a.sanidad.push({...san,id:uid()});
  });
  if(!r.sanidadBatch) r.sanidadBatch=[];
  r.sanidadBatch.push(san);
  
  if(medId){ const m=meds.find(x=>x.id===medId); if(m){ const dosNum=parseFloat(san.dosis)||1; m.stock=Math.max(0,m.stock-dosNum*(r.animales?.length||0)); } }
  
  saveAll(); addActividad('💉','Sanidad batch '+r.nombre,prod+' → '+(r.animales?.length||0)+' animales');
  toast('Sanidad aplicada a '+(r.animales?.length||0)+' animales'); verRodeo(rId);
}

function cerrarManga(){ document.getElementById('modoCarta').classList.remove('open'); }

function selAccion(a){

  document.querySelectorAll('.mc-accion-btn').forEach(b=>{b.classList.remove('sel'); if(b.dataset.accion===a) b.classList.add('sel')});

function renderMcForm(){
  const frm=document.getElementById('mc-form');
  const div=document.getElementById('mc-carencia-info');
  
  if(mcAccion==='peso'){
    frm.style.display='block';
    frm.innerHTML=`<div class="mc-label">Peso (kg)</div><input id="mc-peso" class="mc-input" type="number" placeholder="000" inputmode="decimal" autofocus>`;
    if(div) div.style.display='none';

    frm.style.display='block';
    frm.innerHTML=`<div class="mc-label">Medicamento del gabinete</div>
      <select id="mc-med" class="mc-input" onchange="mcActualizarCarencia()" style="font-size:14px">${medsOpts||'<option>— Sin productos —</option>'}</select>
      <div class="mc-label" style="margin-top:10px">Dosis</div>
      <input id="mc-dosis" class="mc-input" placeholder="10ml" style="margin-bottom:0">`;
    if(div){ div.style.display='block'; mcActualizarCarencia(); }
  } else if(mcAccion==='parto'||mcAccion==='servicio'){
    frm.style.display='block';
    frm.innerHTML=`<div class="mc-label">Nota (opcional)</div><input id="mc-nota-ev" class="mc-input" placeholder="Observación">`;
    if(div) div.style.display='none';
  } else if(mcAccion==='movimiento'){
    frm.style.display='block';
    const rodOpts=rodeos.map(r=>`<option value="${r.id}">${r.nombre}</option>`).join('');
    frm.innerHTML=`<div class="mc-label">Destino (rodeo)</div><select id="mc-rod" class="mc-input" style="font-size:14px">${rodOpts||'<option>Sin rodeos</option>'}</select>`;
    if(div) div.style.display='none';
  } else {
    frm.style.display='block';
    frm.innerHTML=`<div class="mc-label">Descripción</div><input id="mc-nota-ev" class="mc-input" placeholder="Detalle del evento">`;
    if(div) div.style.display='none';
  }
}

function mcActualizarCarencia(){
  const sel=document.getElementById('mc-med');
  const div=document.getElementById('mc-carencia-info');
  if(!sel||!div) return;
  const opt=sel.options[sel.selectedIndex];
  if(opt?.value){
    const car=opt.dataset.car||0;
    if(car>0){
      const fin=calcCarenciaFin(hoy(),car);
      div.innerHTML=`<div class="alerta-item alerta-naranja"><span class="alerta-icon">⏱</span><div><div class="alerta-titulo">Carencia: ${car} días (carne)</div><div class="alerta-det">Animal apto para faena desde ${fmtFecha(fin)}</div></div></div>`;
      div.style.display='block';
    } else { div.style.display='none'; }
  }
}

function mcCarChange(){
  const v=document.getElementById('mc-car').value.trim();
  const vUp=v.toUpperCase();
  // Detectar si es EID numérico de 15 dígitos
  const esEID=/^\d{10,15}$/.test(v);
  if(v.length>=4){
    // Buscar por IDV o por IDE
    const a=esEID
      ? animales.find(x=>x.ide===v)
      : animales.find(x=>x.car===vUp);
    const inf=document.getElementById('mc-animal-info');
    if(a){
      const enCar=enCarencia(a);
      inf.style.display='block';
      inf.innerHTML=`<p><strong>Animal encontrado ✓</strong>${esEID?` <span style="font-size:10px;color:#888">(por IDE)</span>`:''}<br>IDV: <strong>${a.car}</strong>${a.ide?' · IDE: '+a.ide:''}<br>${a.cat} · ${a.raza||'—'} · ${a.estab||'—'}${a.pesajes?.length>0?' · Último peso: '+a.pesajes.slice(-1)[0].kg+' kg':''}${enCar?' <span style="color:var(--rojo)">⚠️ EN CARENCIA</span>':''}</p>`;
      // Si encontró por IDE, poner el IDV en el campo para que mcGuardar use el IDV
      if(esEID) document.getElementById('mc-car').dataset.idvOverride=a.car;
      else delete document.getElementById('mc-car').dataset.idvOverride;
    } else {
      inf.style.display='block';
      inf.innerHTML=`<p style="color:#888">Animal no encontrado — se creará al guardar${esEID?' (EID: '+v+')':''}</p>`;
      delete document.getElementById('mc-car').dataset.idvOverride;
    }
  } else {
    document.getElementById('mc-animal-info').style.display='none';
    delete document.getElementById('mc-car')?.dataset?.idvOverride;
  }
}

function mcGuardar(){
  const carEl=document.getElementById('mc-car');
  const rawVal=carEl?.value.trim();
  // Si escaneó un EID y existe override al IDV, usarlo
  const car=(carEl?.dataset?.idvOverride||rawVal||'').toUpperCase();
  const ideScanned=/^\d{10,15}$/.test(rawVal)?rawVal:null;
  if(!car||car.length<2){ toast('Ingresá la caravana','err'); return; }
  
  let a=animales.find(x=>x.car===car)||(ideScanned?animales.find(x=>x.ide===ideScanned):null);
  if(!a){ a={id:uid(),car,ide:ideScanned||null,cat:'sin categoría',fecha:hoy(),sanidad:[],eventos:[],pesajes:[],reg:hoy(),ts:Date.now()}; animales.push(a); }
  else if(ideScanned&&!a.ide){ a.ide=ideScanned; } // asociar IDE si no lo tenía
  
  if(mcAccion==='peso'){
    const kg=parseFloat(document.getElementById('mc-peso')?.value);
    if(!kg){ toast('Ingresá el peso','err'); return; }
    if(!a.pesajes) a.pesajes=[];
    a.pesajes.push({kg,fecha:hoy(),ts:Date.now()});
    addActividad('⚖️',car,kg+' kg (manga)');
    mcSesionLog.unshift(`⚖️ ${car} — ${kg} kg`);
  } else if(mcAccion==='vacuna'){
    const sel=document.getElementById('mc-med'); const medId=sel?.value;
    const med=meds.find(x=>x.id===medId);
    const dosis=document.getElementById('mc-dosis')?.value||'';
    const san={id:uid(),producto:med?.nombre||'Vacuna',tipo:'vacuna',dosis,fecha:hoy(),medId,carenciaDiasCarne:med?.carenciaCarne||0,carenciaFinCarne:calcCarenciaFin(hoy(),med?.carenciaCarne||0)};
    if(!a.sanidad) a.sanidad=[];
    a.sanidad.push(san);
    if(med&&med.stock>0){ const d=parseFloat(dosis)||1; med.stock=Math.max(0,med.stock-d); }
    addActividad('💉',car,`${med?.nombre||'Vacuna'} (manga)`);
    mcSesionLog.unshift(`💉 ${car} — ${med?.nombre||'Vacuna'}`);
  } else if(mcAccion==='parto'||mcAccion==='servicio'||mcAccion==='movimiento'||mcAccion==='otro'){
    if(!a.eventos) a.eventos=[];
    const nota=document.getElementById('mc-nota-ev')?.value||document.getElementById('mc-rod')?.options[document.getElementById('mc-rod')?.selectedIndex]?.text||'';
    a.eventos.push({id:uid(),tipo:mcAccion,desc:nota,fecha:hoy()});
    if(mcAccion==='parto') a.preg='vacía';
    if(mcAccion==='servicio') a.preg='sin dato';
    if(mcAccion==='movimiento'){ const rId=document.getElementById('mc-rod')?.value; const r=rodeos.find(x=>x.id===rId); if(r&&!r.animales.includes(a.id)) r.animales.push(a.id); }
    addActividad('📋',car,mcAccion+' (manga)');
    mcSesionLog.unshift(`📋 ${car} — ${mcAccion}`);
  }
  
  saveAll();
  mcSesion++;
  document.getElementById('mc-contador').textContent=mcSesion+' registros esta sesión';
  document.getElementById('mc-status').textContent=`✓ ${car} guardado — ${new Date().toLocaleTimeString()}`;
  document.getElementById('mc-status').style.color='var(--verde3)';
  
  // Mostrar log
  const log=document.getElementById('mc-log'); const logItems=document.getElementById('mc-log-items');
  if(log&&logItems){ log.style.display='block'; logItems.innerHTML=mcSesionLog.slice(0,8).map(l=>`<div class="feed-item" style="color:#888"><span style="font-size:14px">${l.slice(0,2)}</span>${l.slice(3)}</div>`).join(''); }
  
  // Resetear
  carEl.value=''; carEl.focus();
  document.getElementById('mc-animal-info').style.display='none';
  renderMcForm();
  calcAlertas(); // actualizar badge
}

// RECONOCIMIENTO DE VOZ — Sistema global
// ════════════════════════════════════════════════
let reconVoz=null; let vozActiva=false; let vozProcesando=false;
let vozCampoActivo=null; // campo activo fuera del modo manga

// Iniciar voz desde cualquier campo del formulario
function vozCampo(campoId, hint){
  if(vozActiva&&vozCampoActivo===campoId){ detenerVoz(); return; }
  if(vozActiva) detenerVoz();
  vozCampoActivo=campoId;
  const btn=document.getElementById('vbtn-'+campoId);
  if(btn) btn.classList.add('escuchando');
  iniciarVozCampo(campoId, hint||'');
}

function iniciarVozCampo(campoId, hint){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    toast('Reconocimiento de voz no disponible. Usá Chrome.','err'); return;
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  reconVoz=new SR();
  reconVoz.lang='es-AR';
  reconVoz.continuous=false;
  reconVoz.interimResults=true;
  vozActiva=true;

  reconVoz.onresult=function(e){
    const res=e.results[e.results.length-1];
    const texto=res[0].transcript.trim();
    const inp=document.getElementById(campoId);
    if(!inp) return;
    if(res.isFinal){
      // Procesar según el tipo de campo
      const valorFinal=procesarVozCampo(campoId, texto, inp);
      inp.value=valorFinal;
      inp.dispatchEvent(new Event('input'));
      vozProcesando=false;
      detenerVozCampo(campoId);
      toast('🎙️ "'+valorFinal+'"');
    } else {
      // Preview mientras habla
      inp.placeholder='🎙️ '+texto+'...';
    }
  };
  reconVoz.onerror=function(e){
    if(e.error!=='no-speech') toast('Error de voz: '+e.error,'err');
    detenerVozCampo(campoId);
  };
  reconVoz.onend=function(){ detenerVozCampo(campoId); };
  reconVoz.start();
}

function detenerVozCampo(campoId){
  const btn=document.getElementById('vbtn-'+(campoId||vozCampoActivo));
  if(btn) btn.classList.remove('escuchando');
  vozActiva=false; vozCampoActivo=null;
  if(reconVoz){ try{reconVoz.stop()}catch(e){} reconVoz=null; }
  // Restaurar placeholder
  const inp=document.getElementById(campoId);
  if(inp&&inp.dataset.placeholder) inp.placeholder=inp.dataset.placeholder;
}

// Procesar el texto según el tipo de campo
function procesarVozCampo(campoId, texto, inp){
  const t=texto.toLowerCase();
  // Guardar placeholder original
  if(!inp.dataset.placeholder) inp.dataset.placeholder=inp.placeholder||'';

  // Números — peso, edad, dosis, stock
  if(campoId.includes('peso')||campoId.includes('kg')||campoId.includes('stock')||campoId.includes('edad')||campoId.includes('dosis')||campoId.includes('car-')){
    const numPals={uno:'1',dos:'2',tres:'3',cuatro:'4',cinco:'5',seis:'6',siete:'7',ocho:'8',nueve:'9',cero:'0',diez:'10',veinte:'20',treinta:'30',cuarenta:'40',cincuenta:'50',sesenta:'60',setenta:'70',ochenta:'80',noventa:'90',cien:'100'};
    let proc=t;
    Object.entries(numPals).forEach(([p,n])=>{ proc=proc.replace(new RegExp('\\b'+p+'\\b','g'),n) });
    const num=proc.match(/[\d]+(?:[.,]\d+)?/);
    if(num) return num[0].replace(',','.');
  }
  // Caravana / IDV
  if(campoId==='f-car'||campoId==='mc-car'){
    const car=texto.replace(/\s/g,'-').toUpperCase();
    return car;
  }
  // Categoría — mapear palabras a categorías válidas
  if(campoId==='f-cat'){
    const catMap={vaca:'vaca',vaquillona:'vaquillona',toro:'toro',torito:'torito',ternero:'ternero',ternera:'ternera',novillo:'novillo',novillito:'novillito'};
    for(const [k,v] of Object.entries(catMap)){ if(t.includes(k)) return v; }
  }
  // Preñez
  if(campoId==='f-preg'){
    if(t.includes('preñ')||t.includes('prena')) return 'preñada';
    if(t.includes('vac')) return 'vacía';
    return 'sin dato';
  }
  // Raza
  if(campoId==='f-raza'){
    const razaMap={'angus':'Aberdeen Angus','hereford':'Hereford','braford':'Braford','brangus':'Brangus','brahman':'Brahman','shorthorn':'Shorthorn','limousin':'Limousin','charolais':'Charolais','simmental':'Simmental'};
    for(const [k,v] of Object.entries(razaMap)){ if(t.includes(k)) return v; }
  }
  // Texto libre — capitalizar primera letra
  return texto.charAt(0).toUpperCase()+texto.slice(1);
}

// Botón de voz genérico para insertar junto a cualquier input
function btnVoz(campoId, hint=''){
  return `<button type="button" id="vbtn-${campoId}" class="voz-campo-btn" onclick="vozCampo('${campoId}','${hint}')" title="Dictar por voz">🎙️</button>`;
}

// ─── VOZ EN MODO MANGA (sistema original mejorado) ───
function toggleVoz(){
  if(vozActiva){ detenerVoz(); return; }
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    toast('Tu navegador no soporta reconocimiento de voz. Usá Chrome.','err'); return;
  }
  iniciarVoz();
}

function iniciarVoz(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  reconVoz=new SpeechRecognition();
  reconVoz.lang='es-AR';
  reconVoz.continuous=true;
  reconVoz.interimResults=true;
  reconVoz.maxAlternatives=1;
  vozActiva=true;
  setVozUI('escuchando','Escuchando... Hablá ahora 🎙️');

  reconVoz.onresult=function(e){
    const trans=e.results[e.results.length-1];
    const texto=trans[0].transcript.trim().toLowerCase();
    if(trans.isFinal){
      vozProcesando=true;
      setVozUI('procesando','Procesando: "'+texto+'"');
      interpretarVoz(texto);
    } else {
      document.getElementById('mc-voz-texto').textContent='🎙️ "'+texto+'"';
    }
  };
  reconVoz.onerror=function(e){
    if(e.error==='no-speech') return;
    setVozUI('idle','Error de voz. Intentá de nuevo.');
    vozActiva=false;
  };
  reconVoz.onend=function(){
    if(vozActiva&&!vozProcesando) iniciarVoz();
    vozProcesando=false;
  };
  reconVoz.start();
}

function detenerVoz(){
  if(reconVoz) reconVoz.stop();
  vozActiva=false; vozProcesando=false;
  setVozUI('idle','Voz desactivada');
}

function setVozUI(estado,texto){
  const btn=document.getElementById('mc-voz-btn');
  const olas=document.getElementById('mc-olas');
  const txEl=document.getElementById('mc-voz-texto');
  if(!btn) return;
  btn.className='voz-btn '+estado;
  btn.textContent=estado==='escuchando'?'🔴':estado==='procesando'?'⏳':'🎙️';
  if(olas) olas.className='voz-olas'+(estado==='escuchando'?' vis':'');
  if(txEl) txEl.textContent=texto;
}

function interpretarVoz(txt){
  const numPals={uno:'1',dos:'2',tres:'3',cuatro:'4',cinco:'5',seis:'6',siete:'7',ocho:'8',nueve:'9',cero:'0',diez:'10',veinte:'20',treinta:'30',cuarenta:'40',cincuenta:'50',cien:'100',doscientos:'200',trescientos:'300',cuatrocientos:'400',quinientos:'500'};
  let proc=txt;
  Object.entries(numPals).forEach(([p,n])=>{ proc=proc.replace(new RegExp('\\b'+p+'\\b','g'),n) });

  // Caravana IDV
  const carMatch=proc.match(/(?:caravana|número|car|idv)\s*([a-z]{2}[\s\-]?\d{4,8})/i)||proc.match(/\b([a-z]{2}[\s\-]?\d{4,8})\b/i);
  if(carMatch){
    const car=carMatch[1].replace(/\s/g,'-').toUpperCase();
    const inp=document.getElementById('mc-car');
    if(inp){ inp.value=car; mcCarChange(); }
    vozFeedback(`IDV: ${car}`);
  }
  // IDE electrónico
  const ideMatch=proc.match(/(?:ide|chip|electrónico|electronico)\s*(\d{10,15})/i)||proc.match(/\b(\d{12,15})\b/);
  if(ideMatch){
    const ide=ideMatch[1];
    const inp=document.getElementById('mc-car');
    if(inp){ inp.value=ide; mcCarChange(); }
    vozFeedback(`IDE: ${ide}`);
  }
  // Peso
  const pesoMatch=proc.match(/(?:peso|pesó|pesa|pesaje)\s*([0-9]+(?:[.,][0-9]+)?)\s*(?:kg|kilo|kilos)?/i)||proc.match(/([0-9]+(?:[.,][0-9]+)?)\s*(?:kg|kilo|kilos)/i);
  if(pesoMatch&&(mcAccion==='peso'||txt.includes('kilo')||txt.includes('kg'))){
    const kg=pesoMatch[1].replace(',','.');
    const inp=document.getElementById('mc-peso');
    if(inp) inp.value=kg;
    selAccion('peso');
    vozFeedback(`Peso: ${kg} kg`);
  }
  // Acción
  if(txt.includes('vacun')){ selAccion('vacuna'); vozFeedback('Modo: vacunación'); }
  else if(txt.includes('parto')){ selAccion('parto'); vozFeedback('Modo: parto'); }
  else if(txt.includes('servicio')){ selAccion('servicio'); vozFeedback('Modo: servicio'); }
  else if(txt.includes('movimiento')||txt.includes('mover')){ selAccion('movimiento'); vozFeedback('Modo: movimiento'); }
  else if(txt.includes('pesaje')||txt.includes('pesar')){ selAccion('peso'); vozFeedback('Modo: pesaje'); }
  // Guardar
  if(txt.includes('guardar')||txt.includes('siguiente')||txt.includes('listo')||txt.includes('ok guardar')){
    setTimeout(()=>{ mcGuardar(); vozFeedback('✓ Guardado'); },300);
  }
  // Nota
  const notaMatch=proc.match(/(?:nota|observación|obs)\s+(.+)/i);
  if(notaMatch){
    const nota=notaMatch[1];
    const inp=document.getElementById('mc-nota-ev');
    if(inp){ inp.value=nota; vozFeedback(`Nota: "${nota}"`); }
  }
  // Dosis
  const dosisMatch=proc.match(/(?:dosis|aplicar)\s+([0-9]+(?:[.,][0-9]+)?)\s*(?:ml|cc)?/i);
  if(dosisMatch){
    const dosis=dosisMatch[1]+' ml';
    const inp=document.getElementById('mc-dosis');
    if(inp){ inp.value=dosis; vozFeedback(`Dosis: ${dosis}`); }
  }
  setVozUI('escuchando','Escuchando... 🎙️');
}

function vozFeedback(msg){
  const el=document.getElementById('mc-voz-texto');
  if(el){ el.textContent='✓ '+msg; el.style.color='var(--verde3)'; setTimeout(()=>{ el.style.color=''; el.textContent='Escuchando...'; },2000); }
}

  const roData=[['Nombre','Establecimiento','Animales','Creado'],...rodeos.map(r=>[r.nombre,r.estab||'',r.animales?.length||0,r.creado||''])];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(roData),'Rodeos');

  XLSX.writeFile(wb,'GanadoApp_'+hoy()+'.xlsx');
  toast('Excel exportado');
}

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js')
      .then(reg=>{ console.log('SW registrado:', reg.scope); })
      .catch(err=>{ console.log('SW error:', err); });
  });
}

// Botón "Instalar app" — capturar evento beforeinstallprompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Mostrar botón de instalación en topbar si existe
  const btn = document.getElementById('btn-instalar');
  if(btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  const btn = document.getElementById('btn-instalar');
  if(btn) btn.style.display = 'none';
  toast('✓ GanadoApp instalada correctamente');
});
function instalarApp(){
  if(!deferredPrompt){ toast('Usá el menú del navegador → "Agregar a pantalla de inicio"'); return; }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r=>{ if(r.outcome==='accepted') toast('Instalando...'); deferredPrompt=null; });
}

cargarDemoSiVacio();
navTo('dashboard');
